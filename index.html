<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOOMIA STUDIO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        /* Smooth full-page transition setup (Scroll Snap) */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #E5D7C4; /* BONE color from your palette */
            font-family: 'Inter', sans-serif;
            scroll-snap-type: y mandatory; /* Snaps the viewport to sections vertically */
            scroll-behavior: smooth; /* Smooth scrolling behavior on click/navigation */
            overflow-x: hidden;
        }

        /* Common layout settings for full-screen sections */
        .page-section {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start; /* Snaps the section perfectly to the top of the viewport */
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        /* === PAGE 1: INTRO === */
        #intro-page {
            overflow: hidden;
        }

        .brand-container {
            position: absolute;
            z-index: 1;
            text-align: center;
            color: #4A5534; /* Darker MOSS GREEN for better contrast */
            
            /* Text fade-in and blur reveal animation */
            opacity: 0;
            animation: bloom 2s ease-in-out forwards;
            animation-delay: 0.3s;
        }

        /* The animation for the text revealing and "blooming" from blur */
        @keyframes bloom {
            0% {
                opacity: 0;
                filter: blur(12px);
                transform: scale(0.92);
                letter-spacing: 0.05em;
            }
            100% {
                opacity: 1;
                filter: blur(0);
                transform: scale(1);
                letter-spacing: 0.15em;
            }
        }

        .loomia, .studio {
            font-size: 6rem; 
            font-weight: 600;
            margin: 0;
            line-height: 1;
        }

        video {
            position: relative; 
            z-index: 2; 
            max-width: 150vw;
            max-height: 150vh;
            border-radius: 15px;
            mix-blend-mode: multiply; 
            pointer-events: none; /* Allows interactions to pass through the video layer */
        }

        /* Minimal scroll indicator at the bottom */
        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            z-index: 3;
            text-align: center;
            color: #4A5534;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-weight: 300;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .scroll-indicator:hover {
            opacity: 0.7;
        }

        /* === PAGE 2: PORTFOLIO === */
        #content-page {
            background-color: #E5D7C4;
            flex-direction: column;
            justify-content: flex-start;
            padding: 80px 40px;
        }

        .portfolio-header {
            color: #354024; /* KOMBU GREEN */
            text-align: center;
            margin-bottom: 60px;
        }

        .portfolio-header h2 {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            margin: 0;
        }

        .portfolio-header p {
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            color: #889063; /* MOSS GREEN */
            margin-top: 10px;
        }

        /* Clean minimalist grid layout for your projects */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            width: 100%;
            max-width: 1100px;
            margin-top: 20px;
        }

        .grid-item {
            background-color: rgba(74, 85, 52, 0.05); /* Subtle tinted green background */
            border: 1px solid rgba(74, 85, 52, 0.2);
            height: 350px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #4A5534;
            font-weight: 300;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .grid-item:hover {
            border-color: #4A5534;
            background-color: rgba(74, 85, 52, 0.08);
            transform: translateY(-4px); /* Smooth lift effect on hover */
        }
    </style>
</head>
<body>

    <section class="page-section" id="intro-page">
        <div class="brand-container">
            <h1 class="loomia">LOOMIA</h1>
            <h2 class="studio">STUDIO</h2>
        </div>

        <video autoplay loop muted playsinline>
            <source src="animacia.mp4" type="video/mp4">
        </video>

        <a href="#content-page" class="scroll-indicator">
            scroll to explore<br>↓
        </a>
    </section>

    <section class="page-section" id="content-page">
        <div class="portfolio-header">
            <h2>MY WORK</h2>
            <p>crafts, electronics & fine arts</p>
        </div>

        <div class="grid-container">
            <div class="grid-item">01 // ELECTRONICS</div>
            <div class="grid-item">02 // PAINTINGS</div>
            <div class="grid-item">03 // TEXTILE ARTS</div>
        </div>
    </section>

</body>
</html>
