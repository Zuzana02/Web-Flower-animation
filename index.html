<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOOMIA STUDIO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #E5D7C4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* TEXT VZADU (Vrstva 1) */
        .brand-container {
            position: absolute; /* Vytrhne text z bežného rozloženia */
            z-index: 1; /* Umiestni ho dozadu */
            text-align: center;
            color: #354024;
        }

        .loomia {
            font-size: 6rem; /* Výrazne väčší font, aby ho bolo vidieť spoza videa */
            font-weight: 600;
            letter-spacing: 0.15em;
            margin: 0;
        }

        .studio {
            font-size: 6rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            margin: 0;
        }

        /* VIDEO VPREDU (Vrstva 2) */
        video {
            position: relative; 
            z-index: 2; /* Umiestni video nad text */
            max-width: 150vw;
            max-height: 150vh;
            border-radius: 15px;
            
            /* Ak má tvoje video biele/svetlé pozadie, toto ho spriehľadní
               a text zozadu bude presvitať. */
            mix-blend-mode: multiply; 
        }
    </style>
</head>
<body>

    <div class="brand-container">
        <h1 class="loomia">LOOMIA</h1>
        <h2 class="studio">STUDIO</h2>
    </div>

    <video autoplay loop muted playsinline>
        <source src="animacia.mp4" type="video/mp4">
    </video>

</body>
</html>
