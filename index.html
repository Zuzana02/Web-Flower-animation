<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOOMIA STUDIO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #E5D7C4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* TEXT VZADU (Vrstva 1) */
        .brand-container {
            position: absolute;
            z-index: 1;
            text-align: center;
            
            /* Bledšia zelená z tvojej palety (MOSS GREEN) pre lepší kontrast */
            color: #889063; 
            
            /* Text je na začiatku skrytý a spúšťa sa animácia "bloom" */
            opacity: 0; 
            animation: bloom 1.5s ease-in-out forwards;
            
            /* Zabezpečí, že animácia nezačne úplne okamžite, ale dá videu pol sekundy náskok */
            animation-delay: 0.5s; 
        }

        /* Samotná animácia objavovania a "kvitnutia" textu */
        @keyframes bloom {
            0% {
                opacity: 0;
                transform: scale(0.95); /* Na začiatku je text o vlások menší */
            }
            100% {
                opacity: 1;
                transform: scale(1); /* Plynule dorastie do normálnej veľkosti */
            }
        }

        .loomia {
            font-size: 6rem; 
            font-weight: 600;
            letter-spacing: 0.15em;
            margin: 0;
        }

        .studio {
            font-size: 6rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            margin: 0;
        }

        /* VIDEO VPREDU (Vrstva 2) */
        video {
            position: relative; 
            z-index: 2; 
            max-width: 150vw;
            max-height: 150vh;
            border-radius: 15px;
            mix-blend-mode: multiply; 
        }
    </style>
</head>
<body>

    <div class="brand-container">
        <h1 class="loomia">LOOMIA</h1>
        <h2 class="studio">STUDIO</h2>
    </div>

    <video autoplay loop muted playsinline>
        <source src="animacia.mp4" type="video/mp4">
    </video>

</body>
</html>
